<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>CYBER-TERMINAL V.2.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        .terminal-box { border: 1px solid #0f0; padding: 20px; background: rgba(0, 20, 0, 0.9); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #0f0; padding: 5px; text-align: center; font-size: 10px; }
        .game-panel { border: 1px solid #ff0; padding: 15px; margin: 10px 0; color: #ff0; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <!-- লগইন স্ক্রিন -->
    <div id="loginScreen" class="terminal-box" style="text-align: center;">
        <h1>[ SYSTEM ACCESS REQUIRED ]</h1>
        <input type="password" id="pin" placeholder="ENTER 078686">
        <button onclick="check()">EXECUTE</button>
    </div>

    <!-- মেইন স্ক্রিন -->
    <div id="mainScreen" class="hidden">
        <div class="terminal-box">
            <h2>SYSTEM BREACHED - AUTHORIZED ACCESS</h2>
            <div id="games" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <div class="game-panel">1. <button onclick="alert('MATH: 50+50=?')">CALC</button></div>
                <div class="game-panel">2. <button onclick="alert('COLOR: Find the Green pixel')">FIND</button></div>
                <div class="game-panel">3. <button onclick="alert('LOGIC: 0 or 1?')">LOGIC</button></div>
                <div class="game-panel">4. <button onclick="alert('SPEED: Type fast!')">SPEED</button></div>
                <div class="game-panel">5. <button onclick="alert('CODE: Decode 0101')">DECODE</button></div>
            </div>
            
            <div class="grid" id="container"></div>
        </div>
    </div>

    <div id="musicBox"></div>

    <script>
        function check() {
            if(document.getElementById('pin').value === "078686") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                document.getElementById('musicBox').innerHTML = '<iframe src="https://www.youtube.com/embed/LD3ZrGA_bG0?autoplay=1" class="hidden"></iframe>';
                
                // ৫০টি আইটেম তৈরি
                let container = document.getElementById('container');
                for(let i=1; i<=50; i++) {
                    container.innerHTML += `<div class="card">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${i}" width="40"><br>
                        USER_${1000+i}
                    </div>`;
                }
            } else { alert("ACCESS DENIED"); }
        }
    </script>
</body>
</html>
