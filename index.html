        .keypad {

            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 240px;
        }

        .key {
            width: 65px;
            height: 65px;
            background: rgba(0, 40, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 50%;
            color: #0f0;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .key:active {

        .container {

        .card {

            padding: 25px;

        .profile-img {

        .name { font-size: 1.8rem; color: #0f0; margin-bottom: 10px; }

        .username { color: #00ffff; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; }

        .status-text {

            color: #0f0;

    <script>
        // Matrix Rain Background Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*'.split('');
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = '16px monospace';
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 30);

        // Lock & Audio Logic
        let currentPin = "";
        const correctPin = "078686";
        let hasSubscribed = false;

        function enableKeypad() {
            hasSubscribed = true;
        }

        function pressNum(num) {
            if (!hasSubscribed) {
                alert("Please click the YouTube Subscribe button first!");
                return;
            }
            if (currentPin.length < 6) {
                currentPin += num;
                document.getElementById('pinDisplay').innerText = "*".repeat(currentPin.length);
                
                if (currentPin === correctPin) {
                    document.getElementById('lockScreen').style.display = 'none';
                    
                    // Audio trigger on correct pin entry
                    const audio = document.getElementById('hackerAudio');
                    if (audio) {
                        audio.play().catch(function(error) {
                            console.log("Autoplay blocked: ", error);
                        });
                    }
                } else if (currentPin.length === 6) {
                    setTimeout(() => {
                        alert("ACCESS DENIED: Wrong Password!");
                        clearPin();
                    }, 100);
                }
            }
        }

        function clearPin() {
            currentPin = "";
            document.getElementById('pinDisplay').innerText = "------";
        }
