<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>CYBER-COMMAND V.7.0</title>
    <style>
        :root { --neon: #0f0; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .box { border: 1px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .hidden { display: none !important; }
        #monitor { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat { border: 1px solid var(--neon); padding: 10px; text-align: center; }
        #console { height: 300px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 15px; font-size: 14px; }
        .prompt { display: flex; margin-top: 10px; }
        input { flex: 1; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; }
        button { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 10px 20px; cursor: pointer; }
        button:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div id="login" style="text-align: center; margin-top: 15%;">
        <h1>[ SYSTEM ACCESS ]</h1>
        <input type="password" id="pin" placeholder="ENTER PIN">
        <button onclick="auth()">EXECUTE</button>
    </div>

    <div id="main" class="hidden">
        <div id="monitor">
            <div class="stat">CPU: <span id="cpu">0%</span></div>
            <div class="stat">RAM: <span id="ram">0%</span></div>
            <div class="stat">NET: <span id="net">STABLE</span></div>
        </div>
        <div class="box">
            <div id="console"> > SYSTEM_BOOTED. WELCOME ADMIN.</div>
            <div class="prompt">
                <input type="text" id="cmdInput" placeholder="ENTER COMMAND...">
                <button onclick="processCmd()">RUN</button>
            </div>
        </div>
    </div>

    <script>
        function auth() {
            if(document.getElementById('pin').value === "078686") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('bgMusic').play();
                updateStats();
            } else { alert("ACCESS DENIED"); }
        }

        function processCmd() {
            let cmd = document.getElementById('cmdInput').value.toUpperCase();
            let con = document.getElementById('console');
            con.innerHTML += `<br> > $ ${cmd} ... EXECUTING... SUCCESS.`;
            document.getElementById('cmdInput').value = '';
            con.scrollTop = con.scrollHeight;
        }

        function updateStats() {
            setInterval(() => {
                document.getElementById('cpu').innerText = Math.floor(Math.random() * 100) + "%";
                document.getElementById('ram').innerText = Math.floor(Math.random() * 100) + "%";
            }, 2000);
        }
    </script>
</body>
</html>
