<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM INFILTRATED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #000;
            color: #0f0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        /* Matrix Rain Canvas */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* --- LOCK SCREEN OVERLAY --- */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #0f0;
        }

        .lock-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px #0f0;
        }

        /* Youtube Lock Step */
        .sub-btn {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .sub-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff0000;
        }

        /* Display Pin Box */
        .pin-display {
            width: 220px;
            height: 45px;
            background: #111;
            border: 2px solid #0f0;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-align: center;
            line-height: 45px;
            letter-spacing: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        /* Keypad Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 240px;
        }

        .key {
            width: 65px;
            height: 65px;
            background: rgba(0, 40, 0, 0.5);
            border: 2px solid #0f0;
            border-radius: 50%;
            color: #0f0;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }
        .key:active {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }
        .key.clear {
            font-size: 0.9rem;
            border-color: #ff0055;
            color: #ff0055;
        }

        /* --- MAIN SITE CONTENT --- */
        .title {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0 40px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #0f0;
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px -2px 0 #ff00ff, -2px 2px 0 #00ffff, 0 0 10px #0f0; }
            50% { text-shadow: -2px 2px 0 #ff00ff, 2px -2px 0 #00ffff, 0 0 15px #0f0; }
            100% { text-shadow: 2px -2px 0 #ff00ff, -2px 2px 0 #00ffff, 0 0 10px #0f0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            max-width: 400px;
            z-index: 1;
        }

        .card {
            background: rgba(0, 10, 0, 0.85);
            border: 2px solid #0f0;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            animation: cardFloat 3s ease-in-out infinite alternate;
        }
        .card:nth-child(2) { animation-delay: 1.5s; }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        .card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #0f0;
            margin: 0 auto 15px auto;
            object-fit: cover;
            box-shadow: 0 0 10px #0f0;
        }

        .name { font-size: 1.8rem; color: #0f0; margin-bottom: 10px; }
        .info { font-size: 1rem; color: #88ff88; margin: 5px 0; }
        .username { color: #00ffff; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Lock Screen Screen overlay -->
    <div id="lockScreen">
        <div class="lock-title">STEP 1: SUBSCRIBE TO UNLOCK</div>
        <!-- তোমার ইউটিউব চ্যানেলের লিঙ্ক এখানে দেওয়া হলো -->
        <a href="https://www.youtube.com/@LDR-YSN?sub_confirmation=1" target="_blank" class="sub-btn" onclick="enableKeypad()">🔴 SUBSCRIBE @LDR-YSN</a>

        <div class="lock-title" style="margin-top: 10px;">STEP 2: ENTER BYPASS PIN</div>
        <div class="pin-display" id="pinDisplay">------</div>
        
        <!-- Mobile Style Keypad -->
        <div class="keypad">
            <div class="key" onclick="pressNum(1)">1</div>
            <div class="key" onclick="pressNum(2)">2</div>
            <div class="key" onclick="pressNum(3)">3</div>
            <div class="key" onclick="pressNum(4)">4</div>
            <div class="key" onclick="pressNum(5)">5</div>
            <div class="key" onclick="pressNum(6)">6</div>
            <div class="key" onclick="pressNum(7)">7</div>
            <div class="key" onclick="pressNum(8)">8</div>
            <div class="key" onclick="pressNum(9)">9</div>
            <div class="key clear" onclick="clearPin()">CLR</div>
            <div class="key" onclick="pressNum(0)">0</div>
            <div class="key" style="visibility: hidden;"></div>
        </div>
    </div>

    <!-- Background Matrix Rain -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Main System Content -->
    <div class="title">System Infiltrated</div>
    <div class="container">
        <!-- Card 1: Yeasin -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=400" alt="Yeasin" class="profile-img">
            <h2 class="name">Yeasin</h2>
            <p class="info">Age: 15+</p>
            <p class="info">From: Chattogram</p>
            <a href="https://tiktok.com/@yeasin_bhai_86" target="_blank" class="username">@yeasin_bhai_86</a>
        </div>

        <!-- Card 2: Tanjid -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" alt="Tanjid" class="profile-img">
            <h2 class="name">Tanjid</h2>
            <p class="info">Age: 13+</p>
            <p class="info">From: Chattogram</p>
            <a href="https://tiktok.com/@tamjidking86" target="_blank" class="username">@tamjidking86</a>
        </div>
    </div>

    <script>
        // Matrix Rain System
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+-='.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // PIN Security System
        let currentPin = "";
        const correctPin = "078686";
        let hasSubscribed = false;

        function enableKeypad() {
            hasSubscribed = true;
        }

        function pressNum(num) {
            if (!hasSubscribed) {
                alert("Please click the YouTube Subscribe button first!");
                return;
            }
            if (currentPin.length < 6) {
                currentPin += num;
                document.getElementById('pinDisplay').innerText = "*".repeat(currentPin.length);
                
                // অটোমেটিক পাসওয়ার্ড চেক যখন ৬টা সংখ্যা হবে
                if (currentPin === correctPin) {
                    document.getElementById('lockScreen').style.display = 'none';
                } else if (currentPin.length === 6) {
                    setTimeout(() => {
                        alert("ACCESS DENIED: Wrong Password!");
                        clearPin();
                    }, 100);
                }
            }
        }

        function clearPin() {
            currentPin = "";
            document.getElementById('pinDisplay').innerText = "------";
        }
    </script>
</body>
</html>
