<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Cyber System - Extended</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; overflow-x: hidden; }
        .hidden-panel { display: none !important; }
        .glitch-title { font-size: 30px; margin: 20px; text-transform: uppercase; }
        
        /* প্রোফাইল গ্রিড */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #0a0a0a; border: 1px solid #0f0; padding: 10px; border-radius: 8px; font-size: 12px; }
        .card img { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #0f0; }

        /* গেম স্টাইল */
        #gameArea { background: #050; padding: 20px; border: 2px dashed #0f0; margin: 20px auto; max-width: 400px; }
    </style>
</head>
<body>

    <div id="quizScreen">
        <h1 class="glitch-title">SECURITY BREACH</h1>
        <input type="password" id="passInput" placeholder="ENTER PIN" style="background:#000; color:#0f0; border:1px solid #0f0; padding:10px;">
        <button onclick="checkPass()">BYPASS</button>
    </div>

    <div id="accessScreen" class="hidden-panel">
        <h1 class="glitch-title">SYSTEM INFILTRATED</h1>
        
        <!-- গেম সেকশন -->
        <div id="gameArea">
            <h3>MINI-GAME: GUESS THE NUMBER (1-10)</h3>
            <input type="number" id="guessInput" style="width:50px;">
            <button onclick="playGame()">GUESS</button>
            <p id="gameResult"></p>
        </div>

        <div class="container" id="profileGrid"></div>
    </div>

    <div id="musicBox"></div>

    <script>
        // ৫০টি আইটেম জেনারেট করা
        function loadProfiles() {
            const grid = document.getElementById('profileGrid');
            for (let i = 1; i <= 50; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${i}" alt="User">
                        <h3>Friend ${i}</h3>
                        <p>ID: 860${i}</p>
                    </div>
                `;
            }
        }

        // গেম ফাংশন
        function playGame() {
            let userGuess = document.getElementById('guessInput').value;
            let target = Math.floor(Math.random() * 10) + 1;
            document.getElementById('gameResult').innerText = 
                (userGuess == target) ? "SUCCESS: ACCESS GRANTED" : "FAILED: WRONG GUESS";
        }

        function checkPass() {
            if (document.getElementById('passInput').value === "078686") {
                document.getElementById('quizScreen').classList.add('hidden-panel');
                document.getElementById('accessScreen').classList.remove('hidden-panel');
                document.getElementById('musicBox').innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/LD3ZrGA_bG0?autoplay=1&loop=1&playlist=LD3ZrGA_bG0" frameborder="0" allow="autoplay"></iframe>';
                loadProfiles();
            } else {
                alert("ACCESS DENIED!");
            }
        }
    </script>
</body>
</html>
